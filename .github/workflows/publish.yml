name: Publish

# Thin caller for the canonical npm publish recipe — see ADR-020.
# All Node version, registry-url, OIDC, provenance, and SBOM logic lives in
# mnemom/.github/.github/workflows/npm-publish.yml. To change the recipe, edit
# the canonical workflow there; do not re-add steps inline here.
#
# Repo-specific logic that stays inline:
#   - validate: tag vs. typescript/package.json + python/pyproject.toml versions
#   - test: TypeScript build + Python import smoke test
#   - publish-pypi: PyPI is a separate registry, not covered by the npm reusable

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      dispatch-id:
        description: "Correlation ID from deploy orchestrator"
        required: false
        type: string
      npm-directory:
        description: "Directory containing package.json to publish"
        required: false
        type: string
        default: "typescript"


permissions: {}
jobs:
  # ── Release-triggered: validate → test → (publish-npm, publish-pypi) ──

  validate:
    permissions:
      contents: read
    if: github.event_name == 'release'
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
      - name: Validate Python version
        run: |
          PYPI_VERSION=$(python3 -c "
          import tomllib
          with open('python/pyproject.toml', 'rb') as f:
              print(tomllib.load(f)['project']['version'])
          ")
          if [ "$PYPI_VERSION" != "${{ steps.version.outputs.version }}" ]; then
            echo "ERROR: pyproject.toml version ($PYPI_VERSION) != tag (${{ steps.version.outputs.version }})"
            exit 1
          fi
      - name: Validate TypeScript version
        run: |
          NPM_VERSION=$(node -p "require('./typescript/package.json').version")
          if [ "$NPM_VERSION" != "${{ steps.version.outputs.version }}" ]; then
            echo "ERROR: package.json version ($NPM_VERSION) != tag (${{ steps.version.outputs.version }})"
            exit 1
          fi

  test:
    permissions:
      contents: read
    if: github.event_name == 'release'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: actions/setup-node@6044e13b5dc448c55e2357c09f80417699197238 # v6
        with:
          node-version: "24"
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"
      - name: TypeScript checks
        working-directory: typescript
        run: npm install && npm run typecheck && npm run build
      - name: Python checks
        run: |
          pip install "python/"
          python -c "from mnemom_types import ReputationScore, GRADE_ORDINALS, COMPONENT_WEIGHTS; print('All imports OK')"

  publish-npm:
    needs: [validate, test]
    if: github.event_name == 'release'
    permissions:
      contents: write   # for SBOM attach to GitHub Release
      id-token: write   # for npm OIDC Trusted Publisher
    # mnemom/.github @ scale/step-29-reusable-npm-publish merge (ADR-020)
    uses: mnemom/.github/.github/workflows/npm-publish.yml@d2a3ba746b61b4dd0f44e75d2eb62231004ad022
    with:
      npm-directory: typescript
      tag: latest

  publish-pypi:
    permissions:
      contents: read
    needs: [validate, test]
    if: github.event_name == 'release'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: python
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"
      - run: pip install build twine
      - run: python -m build
      - run: twine upload dist/*
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}

  # ── Orchestrator dispatch publishing ──

  dispatch-publish:
    if: github.event_name == 'workflow_dispatch'
    permissions:
      contents: read
      id-token: write
    # mnemom/.github @ scale/step-29-reusable-npm-publish merge (ADR-020)
    uses: mnemom/.github/.github/workflows/npm-publish.yml@d2a3ba746b61b4dd0f44e75d2eb62231004ad022
    with:
      # Defensive defaults: GitHub Actions validates `with:` expressions at
      # workflow load time, before the job-level `if:` is evaluated. On a
      # release event the `inputs` context is empty, so a bare
      # `${{ inputs.npm-directory }}` resolves to "" — which fails the
      # reusable workflow's required-string input validation and causes a
      # workflow startup_failure. The `||` fallback keeps the expression
      # valid on both event types; the `if:` above still skips this job on
      # non-dispatch events.
      npm-directory: ${{ inputs.npm-directory || 'typescript' }}
      dispatch-id: ${{ inputs.dispatch-id || '' }}
      tag: latest
      attach-sbom-to-release: false   # dispatch path has no release to attach to
