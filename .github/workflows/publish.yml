name: Publish

on:
  release:
    types: [published]

jobs:
  validate:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v4
      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Validate Python version
        run: |
          PYPI_VERSION=$(python3 -c "
          import tomllib
          with open('python/pyproject.toml', 'rb') as f:
              print(tomllib.load(f)['project']['version'])
          ")
          if [ "$PYPI_VERSION" != "${{ steps.version.outputs.version }}" ]; then
            echo "ERROR: pyproject.toml version ($PYPI_VERSION) != tag (${{ steps.version.outputs.version }})"
            exit 1
          fi

      - name: Validate TypeScript version
        run: |
          NPM_VERSION=$(node -p "require('./typescript/package.json').version")
          if [ "$NPM_VERSION" != "${{ steps.version.outputs.version }}" ]; then
            echo "ERROR: package.json version ($NPM_VERSION) != tag (${{ steps.version.outputs.version }})"
            exit 1
          fi

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: TypeScript checks
        working-directory: typescript
        run: npm ci && npm run typecheck && npm run build

      - name: Python checks
        run: |
          pip install "python/"
          python -c "from mnemom_types import ReputationScore, GRADE_ORDINALS, COMPONENT_WEIGHTS; print('All imports OK')"

  publish-npm:
    needs: [validate, test]
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: typescript
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"
      - run: npm ci
      - run: npm run build
      - run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  publish-pypi:
    needs: [validate, test]
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: python
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install build twine
      - run: python -m build
      - run: twine upload dist/*
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
