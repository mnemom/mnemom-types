name: Publish

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      dispatch-id:
        description: "Correlation ID from deploy orchestrator"
        required: false
        type: string
      npm-directory:
        description: "Directory containing package.json to publish"
        required: false
        type: string
        default: "typescript"


permissions: {}
jobs:
  # ── Release-triggered publishing (existing) ──

  validate:
    permissions:
      contents: read
    if: github.event_name == 'release'
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
      - name: Validate Python version
        run: |
          PYPI_VERSION=$(python3 -c "
          import tomllib
          with open('python/pyproject.toml', 'rb') as f:
              print(tomllib.load(f)['project']['version'])
          ")
          if [ "$PYPI_VERSION" \!= "${{ steps.version.outputs.version }}" ]; then
            echo "ERROR: pyproject.toml version ($PYPI_VERSION) \!= tag (${{ steps.version.outputs.version }})"
            exit 1
          fi
      - name: Validate TypeScript version
        run: |
          NPM_VERSION=$(node -p "require('./typescript/package.json').version")
          if [ "$NPM_VERSION" \!= "${{ steps.version.outputs.version }}" ]; then
            echo "ERROR: package.json version ($NPM_VERSION) \!= tag (${{ steps.version.outputs.version }})"
            exit 1
          fi

  test:
    permissions:
      contents: read
    if: github.event_name == 'release'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "20"
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"
      - name: TypeScript checks
        working-directory: typescript
        run: npm install && npm run typecheck && npm run build
      - name: Python checks
        run: |
          pip install "python/"
          python -c "from mnemom_types import ReputationScore, GRADE_ORDINALS, COMPONENT_WEIGHTS; print('All imports OK')"

  publish-npm:
    permissions:
      contents: read
      id-token: write
    needs: [validate, test]
    if: github.event_name == 'release'
    runs-on: ubuntu-latest
    environment: production
    defaults:
      run:
        working-directory: typescript
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "22"
      - run: npm install
      - run: npm run build
      - run: npm publish --access public --provenance

  publish-pypi:
    permissions:
      contents: read
    needs: [validate, test]
    if: github.event_name == 'release'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: python
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"
      - run: pip install build twine
      - run: python -m build
      - run: twine upload dist/*
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}

  # ── Orchestrator dispatch publishing ──

  dispatch-publish:
    permissions:
      contents: read
      id-token: write
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "22"

      - name: Install and build
        working-directory: ${{ inputs.npm-directory }}
        run: |
          npm ci || npm install
          npm run build --if-present
      - name: Check if already published
        id: check
        working-directory: ${{ inputs.npm-directory }}
        run: |
          PKG_NAME=$(node -p "require('./package.json').name")
          PKG_VERSION=$(node -p "require('./package.json').version")
          PUBLISHED=$(npm view "${PKG_NAME}@${PKG_VERSION}" version 2>/dev/null || echo "")
          if [ "$PUBLISHED" = "$PKG_VERSION" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "$PKG_NAME@$PKG_VERSION already published — skipping"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
            echo "Will publish $PKG_NAME@$PKG_VERSION"
          fi
      - name: Publish
        if: steps.check.outputs.skip != 'true'
        working-directory: ${{ inputs.npm-directory }}
        run: npm publish --access public --provenance

      - name: Generate SBOM
        uses: anchore/sbom-action@17ae1740179002c89186b61233e0f892c3118b11 # v0
        with:
          format: cyclonedx-json
          output-file: sbom.cdx.json
      - name: Upload SBOM
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: sbom
          path: sbom.cdx.json
