version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      actions:
        patterns: ["*"]
  - package-ecosystem: "npm"
    directory: "/typescript"
    schedule:
      interval: "weekly"
    groups:
      dependencies:
        patterns: ["*"]
  - package-ecosystem: "pip"
    directory: "/python"
    schedule:
      interval: "weekly"
    groups:
      dependencies:
        patterns: ["*"]
